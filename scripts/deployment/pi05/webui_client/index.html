<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Pi0.5 LeRobot Eval WebUI</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
  </head>
  <body>
    <div class="topbar">
      <div class="title">Pi0.5 LeRobot Eval WebUI</div>
      <div class="conn">
        <span id="connStatus" class="badge badge-gray">disconnected</span>
        <span class="kv">ws_url</span>
        <input id="wsUrl" class="input" value="ws://127.0.0.1:8765/ws" />
        <button id="btnConnect" class="btn">Connect</button>
        <button id="btnDisconnect" class="btn btn-secondary" disabled>Disconnect</button>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="cardTitle">Run</div>
        <div class="mono">
          <div><span class="kv">run_id</span> <span id="runId">-</span></div>
          <div><span class="kv">repo_id</span> <span id="repoId">-</span></div>
          <div><span class="kv">backend</span> <span id="backend">-</span></div>
          <div><span class="kv">episode_id</span> <span id="episodeId">-</span></div>
          <div><span class="kv">global_index</span> <span id="globalIndex">-</span></div>
          <div><span class="kv">k_in_chunk</span> <span id="kInChunk">-</span></div>
          <div><span class="kv">infer_ms</span> <span id="inferMs">-</span></div>
          <div><span class="kv">mae</span> <span id="mae">-</span></div>
          <div><span class="kv">mse</span> <span id="mse">-</span></div>
        </div>
      </div>

      <div class="card span2">
        <div class="cardTitle">Prompt</div>
        <div id="prompt" class="prompt">-</div>
      </div>

      <div class="card">
        <div class="cardTitle">Base RGB</div>
        <img id="imgBase" class="img" alt="base rgb" />
      </div>

      <div class="card">
        <div class="cardTitle">Wrist RGB</div>
        <div class="sub">
          <label class="checkbox">
            <input id="toggleWrist" type="checkbox" />
            显示 wrist（仅当 server 发送）
          </label>
        </div>
        <img id="imgWrist" class="img" alt="wrist rgb" style="display: none" />
      </div>

      <div class="card span4">
        <div class="cardTitle">
          Action 曲线（滚动窗口）
          <span class="sub">gt vs pred</span>
        </div>
        <div class="sub">
          <span class="kv">window</span>
          <input id="windowSize" class="input small" type="number" min="50" max="5000" value="200" />
          <span class="kv">dims</span>
          <input id="dims" class="input" value="0,1,2" />
          <button id="btnApplyDims" class="btn btn-secondary">Apply</button>
        </div>
        <div id="chart" class="chart"></div>
      </div>
    </div>

    <div class="footer">
      提示：若直接双击打开页面遇到跨域/资源问题，建议在本目录运行
      <code>python -m http.server 8000</code> 后用浏览器访问。
    </div>

    <script src="./app.js"></script>
  </body>
</html>

[pytest]
# 测试发现
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# E2E 标记
markers =
    e2e: End-to-end tests (may be slow or require GPU)
    e2e_slow: Slow E2E tests
    e2e_gpu: E2E tests requiring GPU
# 默认忽略
addopts = -v --tb=short
# 过滤警告（可选）
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
